services:
  - type: web
    name: portfolio-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python3 seed_data.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: sqlite:///./portfolio.db
      - key: ALLOWED_ORIGINS
        sync: false
    plan: free
